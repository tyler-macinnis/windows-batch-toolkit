name: Build

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create README
        shell: pwsh
        run: |
          @"
          Instructions:
          1. Open the scripts folder.
          2. Run the .bat file inside.
          3. Run as Administrator if required.
          "@ | Out-File -FilePath "README.txt" -Encoding utf8

      - name: Stage package files
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP "release-package"

          if (Test-Path $stagingDir) {
            Remove-Item -Recurse -Force $stagingDir
          }

          New-Item -ItemType Directory -Path $stagingDir | Out-Null
          Copy-Item -Path "scripts" -Destination (Join-Path $stagingDir "scripts") -Recurse
          Copy-Item -Path "README.txt" -Destination (Join-Path $stagingDir "README.txt")

      - name: Create zip
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP "release-package"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "${{ inputs.artifact_name }}.zip"

          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }

          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_name }}.zip