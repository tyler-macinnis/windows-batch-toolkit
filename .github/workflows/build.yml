name: Build

on:
  workflow_call:
    inputs:
      os: 
        required: true
        type: string
      artifact_name:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create README
        run: |
          echo "Windows Batch Toolkit" > README.txt
          echo "" >> README.txt
          echo "Instructions:" >> README.txt
          echo "1. Open the 'scripts' folder." >> README.txt
          echo "2. Run the .bat file inside the folder." >> README.txt
          echo "3. If prompted, run the script as Administrator." >> README.txt

      - name: Prepare package
        run: |
          mkdir package
          cp -r scripts package/scripts
          cp README.txt package/README.txt

      - name: Create zip
        run: |
          cd package
          zip -r ../${{ inputs.artifact_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_name }}.zip